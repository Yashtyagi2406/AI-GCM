# ── Analytics Processor Deployment ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-processor
  namespace: ai-gcm
  labels:
    app: analytics-processor
    component: data
spec:
  replicas: 2
  selector:
    matchLabels: { app: analytics-processor }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: analytics-processor }
    spec:
      containers:
        - name: analytics-processor
          image: AI_GCM_ECR/ai-gcm/analytics-processor:latest
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: ai-gcm-config
                  key: kafka-brokers
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-gcm-secrets
                  key: clickhouse-url
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "exit 0"]
            initialDelaySeconds: 10
            periodSeconds: 30
---
# ── Audit Service Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: ai-gcm
  labels:
    app: audit-service
    component: compliance
spec:
  replicas: 2
  selector:
    matchLabels: { app: audit-service }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: audit-service }
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: audit-service
          image: AI_GCM_ECR/ai-gcm/audit-service:latest
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: PORT
              value: "3004"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-gcm-secrets
                  key: database-url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: ai-gcm-config
                  key: kafka-brokers
            - name: AUDIT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-gcm-secrets
                  key: audit-signing-key
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /health, port: 3004 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 3004 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: ai-gcm
spec:
  selector: { app: audit-service }
  ports:
    - port: 3004
      targetPort: 3004
      name: http
---
# ── Report Service Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: ai-gcm
  labels:
    app: report-service
    component: reporting
spec:
  replicas: 1
  selector:
    matchLabels: { app: report-service }
  strategy:
    type: Recreate   # only 1 replica for report generation (file writes)
  template:
    metadata:
      labels: { app: report-service }
    spec:
      containers:
        - name: report-service
          image: AI_GCM_ECR/ai-gcm/report-service:latest
          ports:
            - containerPort: 3005
              name: http
          env:
            - name: PORT
              value: "3005"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-gcm-secrets
                  key: database-url
            - name: REPORTS_DIR
              value: /data/reports
          volumeMounts:
            - name: report-storage
              mountPath: /data/reports
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health, port: 3005 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 3005 }
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: report-storage
          persistentVolumeClaim:
            claimName: report-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: report-service
  namespace: ai-gcm
spec:
  selector: { app: report-service }
  ports:
    - port: 3005
      targetPort: 3005
      name: http
---
# ── Report Storage PVC ────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: report-storage-pvc
  namespace: ai-gcm
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: gp3
  resources:
    requests:
      storage: 20Gi
---
# ── ML Service Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: ai-gcm
  labels:
    app: ml-service
    component: ml
spec:
  replicas: 2
  selector:
    matchLabels: { app: ml-service }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 1 }
  template:
    metadata:
      labels: { app: ml-service }
    spec:
      containers:
        - name: ml-service
          image: AI_GCM_ECR/ai-gcm/ml-service:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-gcm-secrets
                  key: clickhouse-url
            - name: ML_RETRAIN_INTERVAL_SECONDS
              value: "21600"  # 6 hours
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: "2",  memory: 2Gi }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: ai-gcm
spec:
  selector: { app: ml-service }
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
