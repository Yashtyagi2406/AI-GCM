version: '3.9'

services:
  # ── PostgreSQL
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aigcm
      POSTGRES_USER: aigcm
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigcm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ── Kafka (KRaft mode, no ZooKeeper)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # ── ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ../../database/clickhouse/schemas:/docker-entrypoint-initdb.d
    ulimits:
      nofile: { soft: 262144, hard: 262144 }

  # ── AI Proxy (Go)
  proxy:
    build:
      context: ../../services/proxy
      dockerfile: Dockerfile
    ports: ["8080:8080"]
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://aigcm:password@postgres:5432/aigcm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on: [postgres, redis, kafka]

  # ── API Gateway (TypeScript)
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    ports: ["3001:3001"]
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://aigcm:password@postgres:5432/aigcm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-prod
    depends_on: [postgres, redis]

  # ── Cost Engine (Go)
  cost-engine:
    build:
      context: ../../services/cost-engine
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://aigcm:password@postgres:5432/aigcm
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on: [postgres, kafka, redis]

  # ── Analytics Processor (Go)
  analytics-processor:
    build:
      context: ../../services/analytics-processor
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      CLICKHOUSE_URL: http://clickhouse:8123
    depends_on: [kafka, clickhouse]

  # ── ML Service (Python)
  ml-service:
    build:
      context: ../../services/ml-service
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://aigcm:password@postgres:5432/aigcm
      CLICKHOUSE_URL: http://clickhouse:8123
    depends_on: [postgres, clickhouse]

  # ── Alert Engine (Go)
  alert-engine:
    build:
      context: ../../services/alert-engine
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgresql://aigcm:password@postgres:5432/aigcm
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on: [kafka, postgres]

  # ── Web Dashboard (Next.js)
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_PROXY_URL: http://localhost:8080
    depends_on: [api-gateway]

volumes:
  postgres_data:
  clickhouse_data:
