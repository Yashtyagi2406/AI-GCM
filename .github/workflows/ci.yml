name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── TypeScript Lint & Build ──────────────────────────────────────────────────
  lint-ts:
    name: TypeScript — Lint & Type-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - apps/web
          - services/api-gateway
          - services/auth-service
          - services/report-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: npm install

      - name: Lint
        working-directory: ${{ matrix.package }}
        run: npm run lint --if-present

      - name: Type-check / Build
        working-directory: ${{ matrix.package }}
        run: npm run build --if-present

  # ── Go Build & Test ──────────────────────────────────────────────────────────
  build-go:
    name: Go — Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/proxy
          - services/cost-engine
          - services/alert-engine
          - services/key-vault
          - services/analytics-processor
          - services/audit-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Download modules
        working-directory: ${{ matrix.service }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build ./...

      - name: Test with coverage
        working-directory: ${{ matrix.service }}
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Report coverage
        working-directory: ${{ matrix.service }}
        run: go tool cover -func=coverage.out | tail -1

  # ── Docker Build Validation ──────────────────────────────────────────────────
  docker-validate:
    name: Docker — Build validation
    runs-on: ubuntu-latest
    needs: [lint-ts, build-go]
    strategy:
      matrix:
        service:
          - { path: services/proxy,                tag: ai-gcm/proxy }
          - { path: services/cost-engine,          tag: ai-gcm/cost-engine }
          - { path: services/alert-engine,         tag: ai-gcm/alert-engine }
          - { path: services/key-vault,            tag: ai-gcm/key-vault }
          - { path: services/api-gateway,          tag: ai-gcm/api-gateway }
          - { path: services/auth-service,         tag: ai-gcm/auth-service }
          - { path: services/analytics-processor,  tag: ai-gcm/analytics-processor }
          - { path: services/audit-service,        tag: ai-gcm/audit-service }
          - { path: services/report-service,       tag: ai-gcm/report-service }
          - { path: apps/web,                      tag: ai-gcm/web }
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image — ${{ matrix.service.tag }}
        run: |
          docker build \
            -t ${{ matrix.service.tag }}:ci-${{ github.sha }} \
            ${{ matrix.service.path }}

  # ── Web Unit Tests ───────────────────────────────────────────────────────────
  test-web:
    name: Web — Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm install

      - name: Run tests
        working-directory: apps/web
        run: npm test --if-present

  # ── OPA Policy Tests ──────────────────────────────────────────────────────────
  test-rego:
    name: OPA — Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x /usr/local/bin/opa

      - name: Run OPA tests
        run: opa test policies/ -v

  # ── Summary ──────────────────────────────────────────────────────────────────
  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint-ts, build-go, docker-validate, test-web, test-rego]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-ts.result }}" != "success" ]] || \
             [[ "${{ needs.build-go.result }}" != "success" ]] || \
             [[ "${{ needs.docker-validate.result }}" != "success" ]] || \
             [[ "${{ needs.test-web.result }}" != "success" ]] || \
             [[ "${{ needs.test-rego.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed ✅"
